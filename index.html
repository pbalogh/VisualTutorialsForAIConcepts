<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Tutorials for AI Concepts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // SPA redirect handler: 404.html redirects /path to /?p=/path
      // This script restores the original path for React Router
      (function() {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('p');
        if (redirect) {
          var query = params.get('q') || '';
          var newUrl = redirect + (query ? query : '') + window.location.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
